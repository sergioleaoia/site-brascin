[build]
  command = "pnpm build && cp dist/client/_shell.html dist/client/index.html"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

# SPA fallback — any unknown path serves index.html so the client router can resolve it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
